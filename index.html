<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RITT INTEL - Engenharia de Elite</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 95%; max-width: 900px; background: rgba(0, 20, 0, 0.95); border: 2px solid #00ff41; padding: 25px; box-shadow: 0 0 30px #00ff41; border-radius: 5px; position: relative; }
        h1 { text-align: center; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid #00ff41; padding-bottom: 15px; margin-top: 0; }
        .input-group { margin: 20px 0; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #008f11; color: #00ff41; font-size: 1rem; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.3s; box-shadow: 0 0 10px #00ff41; }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #ffeb3b; font-weight: bold; text-align: center; }
        #resultado { margin-top: 20px; max-height: 350px; overflow-y: auto; background: #000; padding: 15px; border: 1px solid #00ff41; border-radius: 4px; }
        
        /* Estilo dos Cards de Elite */
        .lead-card { 
            background: #111; 
            border: 1px solid #333; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-left: 5px solid #00ff41; 
            animation: fadeIn 0.5s ease-in;
        }
        .classe-alta { border-left-color: #ff9800 !important; } /* Cor Bronze/Ouro para Classe A */
        .classe-media { border-left-color: #2196f3 !important; } /* Azul para Classe B */
        
        .social-link { color: #00ff41; text-decoration: none; font-weight: bold; border: 1px solid #00ff41; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; }
        .social-link:hover { background: #00ff41; color: #000; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scrollbar Hacker */
        #resultado::-webkit-scrollbar { width: 8px; }
        #resultado::-webkit-scrollbar-track { background: #000; }
        #resultado::-webkit-scrollbar-thumb { background: #008f11; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>RITT - Inteligência de Leads v3.0</h1>
        <div class="input-group">
            <p style="margin-bottom: 10px;">> Digite a URL para extração de dados:</p>
            <input type="text" id="siteLink" placeholder="https://www.rittinvestimentos.com.br" value="">
            <button onclick="iniciarMineraçãoEmMassa()">🚀 ESTRALAR MOTOR EM MASSA (60 LEADS)</button>
        </div>
        
        <div id="status">Aguardando coordenadas...</div>
        <div id="resultado"></div>
    </div>

    <script>
        async function iniciarMineraçãoEmMassa() {
            const link = document.getElementById('siteLink').value;
            const statusDiv = document.getElementById('status');
            const resultadoDiv = document.getElementById('resultado');

            if (!link) {
                statusDiv.innerText = "❌ ERRO: Capitão, preciso da URL para rastrear!";
                return;
            }

            resultadoDiv.innerHTML = "";
            let totalLeads = 0;

            // Loop de 6 ciclos (cada um gera 10 leads = 60 leads totais)
            for (let ciclo = 1; ciclo <= 6; ciclo++) {
                statusDiv.innerText = `🛰️ CICLO ${ciclo}/6: Perfurando banco de dados de elite...`;
                
                try {
                    const response = await fetch('/api/analisar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: link })
                    });

                    const data = await response.json();

                    if (data.error) {
                        statusDiv.innerText = "❌ FALHA NO MOTOR: " + data.error;
                        break; 
                    } else {
                        totalLeads += data.leads_capturados;
                        
                        data.dados.forEach(l => {
                            const card = document.createElement('div');
                            // Diferenciação visual por classe
                            let classeCSS = "";
                            if(l.classe.includes("Alta") || l.classe.includes("A")) classeCSS = "classe-alta";
                            if(l.classe.includes("Média") || l.classe.includes("B")) classeCSS = "classe-media";

                            card.className = `lead-card ${classeCSS}`;
                            card.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <strong>${l.nome}</strong>
                                    <span style="font-size: 0.7rem; background: #222; padding: 2px 5px;">${l.classe}</span>
                                </div>
                                <div style="margin: 8px 0; font-size: 0.8rem; color: #ccc;">
                                    🎯 <b>Foco:</b> ${l.produto}<br>
                                    📉 <b>Status:</b> ${l.estagio}
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                                    <span>📱 ${l.telefone}</span>
                                    <a href="${l.rede_social}" target="_blank" class="social-link">ANALISAR PERFIL</a>
                                </div>
                            `;
                            resultadoDiv.prepend(card); // Adiciona o novo lead no topo
                        });
                        
                        statusDiv.innerText = `⏳ PROGRESSO: ${totalLeads} leads minerados... (Aguardando próximo ciclo)`;
                        // Pequena pausa para a API respirar
                        await new Promise(r => setTimeout(r, 1500));
                    }
                } catch (err) {
                    statusDiv.innerText = "🚨 ERRO CRÍTICO NA CONEXÃO.";
                    console.error(err);
                    break;
                }
            }

            statusDiv.innerText = `✅ MISSÃO CUMPRIDA! ${totalLeads} LEADS SALVOS NO SUPABASE.`;
        }
    </script>
</body>
</html>
