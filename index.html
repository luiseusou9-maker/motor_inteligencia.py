<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RITT INTEL - Engenharia de Elite</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 90%; max-width: 800px; background: rgba(0, 20, 0, 0.9); border: 2px solid #00ff41; padding: 30px; box-shadow: 0 0 20px #00ff41; border-radius: 5px; }
        h1 { text-align: center; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #008f11; color: #00ff41; font-size: 1rem; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #008f11; color: #fff; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #ffeb3b; min-height: 20px; }
        #resultado { margin-top: 20px; max-height: 300px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; font-size: 0.8rem; color: #fff; }
        .lead-card { border-left: 3px solid #00ff41; padding: 10px; margin-bottom: 10px; background: #111; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>RITT - Inteligência de Leads</h1>
        <p>> Digite a URL da empresa alvo:</p>
        <input type="text" id="siteLink" placeholder="https://exemplo.com.br" value="">
        <button onclick="iniciarBusca()">Estralar Motor Glock</button>
        
        <div id="status">Aguardando comando...</div>
        <div id="resultado"></div>
    </div>

    <script>
        async function iniciarBusca() {
            const link = document.getElementById('siteLink').value;
            const statusDiv = document.getElementById('status');
            const resultadoDiv = document.getElementById('resultado');

            if (!link) {
                statusDiv.innerText = "❌ ERRO: Cadê o link, capitão?";
                return;
            }

            statusDiv.innerText = "🛰️ Conectando ao Motor Glock... (Aguarde)";
            resultadoDiv.innerHTML = "";

            try {
                const response = await fetch('/api/analisar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: link })
                });

                const data = await response.json();

                if (data.error) {
                    statusDiv.innerText = "❌ FALHA NO MOTOR: " + data.error;
                } else {
                    statusDiv.innerText = `✅ SUCESSO: ${data.leads_capturados} Hiper Leads salvos no Supabase!`;
                    
                    let htmlLeads = "";
                    data.dados.forEach(l => {
                        htmlLeads += `
                            <div class="lead-card">
                                <strong>Nome:</strong> ${l.nome} | <strong>Tel:</strong> ${l.telefone}<br>
                                <strong>Tática:</strong> ${l.tatica}
                            </div>`;
                    });
                    resultadoDiv.innerHTML = htmlLeads;
                }
            } catch (err) {
                statusDiv.innerText = "🚨 ERRO CRÍTICO: Verifique o console ou a Vercel.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
