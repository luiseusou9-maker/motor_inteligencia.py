<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITT Intelligence | Dashboard</title>
    <style>
        :root { --primary: #38bdf8; --bg: #020617; --card: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { text-align: center; padding: 3rem 1rem; width: 100%; background: linear-gradient(to bottom, #0f172a, var(--bg)); border-bottom: 1px solid #1e293b; }
        .header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; color: var(--primary); text-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        .header p { opacity: 0.7; font-size: 1.1rem; margin-top: 10px; }

        .controls { margin: 2rem 0; }
        .btn-run { background: var(--primary); color: var(--bg); border: none; padding: 12px 30px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; text-transform: uppercase; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
        .btn-run:hover { transform: scale(1.05); filter: brightness(1.2); }

        .dashboard { width: 90%; max-width: 1000px; display: grid; gap: 1.5rem; padding-bottom: 50px; }
        .lead-card { background: var(--card); border: 1px solid #1e293b; padding: 1.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .lead-card:hover { border-color: var(--primary); background: #131e36; }
        .lead-info h3 { margin: 0; color: var(--primary); }
        .lead-info p { margin: 5px 0 0; opacity: 0.8; font-size: 0.9rem; }
        .status-badge { background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; border: 1px solid var(--primary); }
        
        #loader { display: none; margin: 20px; color: var(--primary); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🦅 RITT INTELLIGENCE</h1>
        <p>Sistema de Prospecção de Elite | Cambuí - Campinas</p>
    </div>

    <div class="controls">
        <button class="btn-run" onclick="minerar()">🚀 Iniciar Mineração de Leads</button>
    </div>

    <div id="loader">MOTOR EM OPERAÇÃO: ACESSANDO GOOGLE MAPS...</div>

    <div class="dashboard" id="lead-container">
        </div>

    <script>
        const API_URL = 'https://motor-inteligencia-py.vercel.app/api';

        async function carregarLeads() {
            try {
                const res = await fetch(`${API_URL}/leads`);
                const leads = await res.json();
                const container = document.getElementById('lead-container');
                container.innerHTML = '';

                leads.reverse().forEach(lead => {
                    container.innerHTML += `
                        <div class="lead-card">
                            <div class="lead-info">
                                <h3>${lead.nome}</h3>
                                <p>📍 ${lead.endereco}</p>
                                <p>📞 ${lead.telefone || 'Não informado'}</p>
                            </div>
                            <div class="status-badge">${lead.status || 'Pendente'}</div>
                        </div>
                    `;
                });
            } catch (err) { console.error("Erro ao carregar banco:", err); }
        }

        async function minerar() {
            document.getElementById('loader').style.display = 'block';
            try {
                await fetch(`${API_URL}/minerar`);
                await carregarLeads(); // Recarrega a lista após minerar
            } catch (err) {
                alert("Erro na mineração. Verifique a API.");
            }
            document.getElementById('loader').style.display = 'none';
        }

        // Carrega os dados assim que abrir a página
        carregarLeads();
    </script>
</body>
</html>
