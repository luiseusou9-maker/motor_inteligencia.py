<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMANDER | Operações de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff41; --neon-yellow: #ffea00; --neon-orange: #ff4e00; --darker-bg: #050505; --card-bg: #0d0d0d; }
        body { background: var(--darker-bg); color: #ccc; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); font-size: 2.2em; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .search-box { background: var(--card-bg); padding: 25px; border: 1px solid #222; border-radius: 5px; margin-bottom: 40px; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; background: #000; border: 1px solid #333; color: var(--neon-green); font-family: 'Share Tech Mono'; font-size: 1.1em; outline: none; }
        button { background: var(--neon-green); color: #000; padding: 15px 40px; border: none; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--neon-green); }
        #resultados { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 15px; border-left: 4px solid var(--neon-green); transition: 0.3s; }
        .card h3 { color: #fff; margin: 10px 0; font-family: 'Orbitron'; font-size: 1.1em; }
        .badge { background: #1a1a1a; padding: 3px 8px; border: 1px solid var(--neon-green); font-size: 0.75em; border-radius: 3px; font-weight: bold; }
        .label { color: #555; font-size: 0.7em; text-transform: uppercase; }
        .data-field { margin-bottom: 10px; }
        .social-link { display: block; margin-top: 10px; color: #00f3ff; text-decoration: none; border: 1px solid #00f3ff; padding: 5px; text-align: center; font-size: 0.8em; border-radius: 3px; }
        .social-link:hover { background: rgba(0, 243, 255, 0.1); }
        .loading { display: none; color: var(--neon-green); font-size: 1.2em; margin-bottom: 20px; text-shadow: 0 0 5px var(--neon-green); }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEURAL COMMANDER</h1>
        <p class="subtitle">EXTRAÇÃO DE LEADS | VOLUME: 90 PERFIS | ORDEM A -> B -> C</p>
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="URL DO ALVO PARA ESCANEAMENTO DE INVENTÁRIO...">
            <button onclick="executarVarredura()">VARREDURA TOTAL</button>
        </div>
        <div id="loader" class="loading">📡 Mapeando produtos do site e localizando compradores...</div>
        <div id="resultados"></div>
    </div>

    <script>
        async function executarVarredura() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('resultados');
            const loader = document.getElementById('loader');

            if (!url) return alert("Comandante, forneça a URL!");
            
            resDiv.innerHTML = ''; 
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/analisar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.dados) {
                    data.dados.forEach(lead => {
                        const classe = lead.classe || "C";
                        let corRank = 'var(--neon-green)';
                        if (classe.includes('B')) corRank = 'var(--neon-yellow)';
                        if (classe.includes('C')) corRank = 'var(--neon-orange)';
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.style.borderLeftColor = corRank;

                        card.innerHTML = `
                            <div class="data-field" style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="badge" style="border-color: ${corRank}; color: ${corRank}">RANK ${classe}</span>
                                <span style="color:#fff; font-size:0.9em; font-weight:bold;">R$ ${lead.salario}</span>
                            </div>
                            <h3>${lead.nome}</h3>
                            <div class="label">Ocupação</div>
                            <div style="font-size:0.9em; margin-bottom:10px;">${lead.cargo}</div>
                            <div class="label">Produto Vinculado</div>
                            <div style="color:#fff; font-weight:bold; font-size:0.85em;">📍 ${lead.produto}</div>
                            <div style="margin-top:10px;">
                                <div class="label">Contato Direto</div>
                                <div style="color:var(--neon-green); font-weight:bold;">${lead.telefone}</div>
                            </div>
                            <a href="${lead.social}" target="_blank" class="social-link">VER PERFIL SOCIAL</a>
                        `;
                        resDiv.appendChild(card);
                    });
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Erro na varredura operacional: " + err.message);
            }
        }
    </script>
</body>
</html>
