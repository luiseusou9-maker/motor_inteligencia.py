<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RITT Intelligence | Elite</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .btn { background: #38bdf8; color: #020617; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 12px; margin: 10px; width: 100%; max-width: 600px; }
        #status { margin: 20px; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🦅 RITT INTELLIGENCE</h1>
    <button class="btn" onclick="minerar()">🚀 MINERAR AGORA</button>
    <div id="status">Aguardando comando...</div>
    <div id="leads"></div>

    <script>
        async function minerar() {
            document.getElementById('status').innerText = "⚡ MOTOR EM OPERAÇÃO...";
            try {
                const res = await fetch('/api/minerar');
                const data = await res.json();
                if (data.status === "sucesso") {
                    document.getElementById('status').innerText = "✅ SUCESSO: Leads salvos no banco!";
                    carregarLeads();
                } else {
                    document.getElementById('status').innerText = "❌ ERRO: " + (data.detalhes || data.erro);
                }
            } catch (e) {
                document.getElementById('status').innerText = "❌ FALHA NA CONEXÃO COM O SERVIDOR";
            }
        }

        async function carregarLeads() {
            try {
                const res = await fetch('/api/leads');
                const leads = await res.json();
                const box = document.getElementById('leads');
                box.innerHTML = leads.map(l => `
                    <div class="card">
                        <strong>${l.nome}</strong><br>
                        <small>📍 ${l.endereco}</small>
                    </div>
                `).join('');
            } catch (e) { console.error("Erro ao listar banco."); }
        }
        carregarLeads();
    </script>
</body>
</html>
