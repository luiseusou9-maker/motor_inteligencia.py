<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMANDER | v4.0 Global Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff41; --neon-blue: #00f3ff; --dark: #050505; }
        body { background: var(--dark); color: #ccc; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        h1 { font-family: 'Orbitron'; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .search-box { background: #0d0d0d; padding: 25px; border: 1px solid #333; display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: var(--neon-green); padding: 15px; outline: none; }
        button { background: var(--neon-green); color: #000; font-family: 'Orbitron'; font-weight: bold; border: none; padding: 0 40px; cursor: pointer; }
        #resultados { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-left: 5px solid var(--neon-green); }
        .badge { font-weight: bold; font-size: 0.8em; border: 1px solid; padding: 2px 6px; border-radius: 2px; }
        .label { color: #555; font-size: 0.7em; text-transform: uppercase; margin-top: 10px; }
        .val { color: #fff; font-size: 0.95em; }
        .match-box { background: rgba(0, 243, 255, 0.05); border: 1px dashed var(--neon-blue); padding: 8px; margin-top: 10px; }
        .social-btn { display: block; background: #0044ff; color: #fff; text-decoration: none; padding: 8px; margin-top: 15px; text-align: center; border-radius: 3px; font-size: 0.8em; }
        .loading { display: none; text-align: center; color: var(--neon-green); font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NEURAL COMMANDER v4.0</h1>
            <p>MAPEAMENTO DE ESTOQUE & INTENÇÃO DE COMPRA GLOBAL</p>
        </div>
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="URL DA IMOBILIÁRIA ALVO...">
            <button onclick="executar()">SCAN TOTAL</button>
        </div>
        <div id="loader" class="loading">📡 AGENTE ATIVO: MAPEANDO ESTOQUE E RASTREANDO COMPRADORES...</div>
        <div id="resultados"></div>
    </div>

    <script>
        async function executar() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('resultados');
            const loader = document.getElementById('loader');
            if (!url) return alert("Insira a URL!");
            resDiv.innerHTML = ''; loader.style.display = 'block';

            try {
                const response = await fetch('/api/analisar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                loader.style.display = 'none';

                if (data.dados) {
                    data.dados.forEach(l => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between;">
                                <span class="badge" style="color:var(--neon-green);">${l.classe}</span>
                                <span style="color:#fff;">${l.salario}</span>
                            </div>
                            <h3 style="margin:10px 0; color:#fff;">${l.nome}</h3>
                            <div class="label">Cargo | Origem</div>
                            <div class="val">${l.cargo} | ${l.origem_lead || 'Brasil'}</div>
                            <div class="match-box">
                                <div class="label" style="color:var(--neon-blue); margin-top:0;">🎯 INTERESSE NO SITE</div>
                                <div class="val" style="font-weight:bold;">${l.produto}</div>
                            </div>
                            <div class="label">WhatsApp</div>
                            <div class="val" style="color:var(--neon-green); font-weight:bold; font-size:1.1em;">${l.telefone}</div>
                            <a href="${l.social}" target="_blank" class="social-btn">VER PERFIL SOCIAL</a>
                        `;
                        resDiv.appendChild(card);
                    });
                }
            } catch (err) { loader.style.display = 'none'; alert("Erro: " + err.message); }
        }
    </script>
</body>
</html>
