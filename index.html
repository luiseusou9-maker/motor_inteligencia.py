<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMANDER - Elite Leads</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-green: #00ff41; --dark-bg: #0a0a0a; }
        body { background: var(--dark-bg); color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .container { max-width: 900px; margin: auto; background: #151515; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        input { width: 80%; padding: 15px; border-radius: 5px; border: 1px solid var(--neon-blue); background: #000; color: white; margin-bottom: 20px; font-size: 16px; }
        button { background: var(--neon-blue); color: black; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: 'Orbitron', sans-serif; transition: 0.3s; }
        button:hover { background: var(--neon-green); box-shadow: 0 0 20px var(--neon-green); }
        #resultados { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .card { background: #1a1a1a; padding: 20px; border-left: 5px solid var(--neon-blue); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card h3 { margin-top: 0; color: var(--neon-blue); }
        .status-badge { background: #333; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .momento-quente { color: var(--neon-green); border: 1px solid var(--neon-green); }
        .loading { display: none; color: var(--neon-green); margin-top: 20px; font-family: 'Orbitron', sans-serif; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEURAL COMMANDER</h1>
        <p>Infiltrando dados e extraindo leads de alta conversão.</p>
        
        <input type="text" id="urlInput" placeholder="Cole a URL do alvo (ex: https://hitimoveis.com.br)">
        <br>
        <button onclick="dispararMotor()">⚡ EXECUTAR VARREDURA</button>

        <div id="loading" class="loading">🛰️ ANALISANDO DNA DO SITE E RASTREANDO TUBARÕES...</div>

        <div id="resultados"></div>
    </div>

    <script>
        async function dispararMotor() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('resultados');
            const loader = document.getElementById('loading');

            if (!url) return alert("Comandante, insira uma URL válida!");

            resDiv.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/analisar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.dados) {
                    data.dados.forEach(lead => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <h3>👤 ${lead.nome}</h3>
                            <p><span class="status-badge">Rank ${lead.classe}</span> | 💰 ${lead.salario}</p>
                            <p><strong>💼 Cargo:</strong> ${lead.cargo}</p>
                            <p><strong>🔥 Momento:</strong> <span class="momento-quente">${lead.momento}</span></p>
                            <p><strong>🎯 Alvo:</strong> ${lead.produto}</p>
                            <p><strong>📱 TEL:</strong> ${lead.telefone}</p>
                            <p><strong>💡 Tática:</strong> ${lead.tatica}</p>
                        `;
                        resDiv.appendChild(card);
                    });
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Erro na infiltração: " + err);
            }
        }
    </script>
</body>
</html>
