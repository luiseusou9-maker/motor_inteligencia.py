<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMANDER | Operações de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff41; --darker-bg: #050505; --card-bg: #0d0d0d; }
        body { background: var(--darker-bg); color: #ccc; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); font-size: 2.5em; margin-bottom: 5px; }
        .subtitle { color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        .search-box { background: var(--card-bg); padding: 30px; border: 1px solid #222; border-radius: 5px; margin-bottom: 40px; }
        input { width: 70%; padding: 15px; background: #000; border: 1px solid #333; color: var(--neon-green); font-family: 'Share Tech Mono'; font-size: 1.1em; outline: none; }
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        
        button { background: var(--neon-green); color: #000; padding: 15px 40px; border: none; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; margin-left: 10px; }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--neon-green); }

        #resultados { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 20px; border-left: 4px solid var(--neon-green); position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--neon-green); transform: translateY(-5px); }
        .card h3 { color: #fff; margin-top: 0; font-family: 'Orbitron'; font-size: 1.2em; }
        .badge { background: #1a1a1a; color: var(--neon-green); padding: 4px 8px; border: 1px solid var(--neon-green); font-size: 0.8em; border-radius: 3px; }
        .salary { color: #fff; font-weight: bold; }
        .momento { color: var(--neon-green); font-weight: bold; text-transform: uppercase; font-size: 0.9em; }
        .label { color: #555; font-size: 0.8em; text-transform: uppercase; margin-bottom: 2px; }
        .data-field { margin-bottom: 12px; }
        
        .loading { display: none; color: var(--neon-green); font-size: 1.2em; margin-bottom: 20px; text-shadow: 0 0 5px var(--neon-green); }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEURAL COMMANDER</h1>
        <p class="subtitle">SISTEMA DE EXTRAÇÃO DE LEADS HIGH-TICKET</p>
        
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="DIGITE A URL DO ALVO PARA INFILTRAÇÃO...">
            <button onclick="executarVarredura()">VARREDURA</button>
        </div>

        <div id="loader" class="loading">Iniciando protocolo de busca... Aguarde resposta do satélite...</div>
        <div id="resultados"></div>
    </div>

    <script>
        async function executarVarredura() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('resultados');
            const loader = document.getElementById('loader');

            if (!url) return alert("Comandante, forneça uma URL!");

            loader.style.display = 'block';

            try {
                const response = await fetch('/api/analisar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.dados) {
                    data.dados.forEach(lead => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="data-field">
                                <span class="badge">RANK ${lead.classe}</span>
                                <span style="margin-left:10px" class="salary">${lead.salario}</span>
                            </div>
                            <h3>${lead.nome}</h3>
                            <div class="data-field">
                                <div class="label">Cargo & Atuação</div>
                                <div>${lead.cargo}</div>
                            </div>
                            <div class="data-field">
                                <div class="label">Momento de Compra</div>
                                <div class="momento">${lead.momento}</div>
                            </div>
                            <div class="data-field">
                                <div class="label">Imóvel Sugerido</div>
                                <div style="color:#fff">${lead.produto}</div>
                            </div>
                            <div class="data-field">
                                <div class="label">Contato Direto</div>
                                <div style="color:var(--neon-green)">${lead.telefone}</div>
                            </div>
                            <div class="data-field">
                                <div class="label">Estratégia de Abordagem</div>
                                <div style="font-size:0.9em">${lead.tatica}</div>
                            </div>
                        `;
                        // Adiciona no início da lista
                        resDiv.insertBefore(card, resDiv.firstChild);
                    });
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Falha na varredura: " + err);
            }
        }
    </script>
</body>
</html>
